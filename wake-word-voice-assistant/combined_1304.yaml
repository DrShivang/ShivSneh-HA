external_components:
  - source: github://pr#5894 #5198
    components: [ahtxx]
    refresh: 60s
  - source: github://X-Ryl669/esphome@esp-adf-take2 #pr#5230
    components: [esp_adf]
    refresh: 0s
  - source: github://X-Ryl669/esphome@at581x
    components: at581x
    refresh: 0s

esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio
    build_flags: -j1 -Og
    build_unflags: -Os
  project:
    name: esphome.voice-assistant
    version: "2.0"
  min_version: 2023.11.5
  on_boot:
    - priority: 200
      then:
        - at581x.settings:
            id: "Waveradar"
            hw_frontend_reset: false
            frequency: 5800Mhz  
            sensing_distance: 400 # 0-1023
            poweron_selfcheck_time: 2s
            protect_time: 1s 
            trigger_base: 500ms
            trigger_keep: 30s 
            stage_gain: 1 # 0-12 the higher the value the smaller the gain, Lower value increases sensitivity
            power_consumption: 70uA
            # https://github.com/X-Ryl669/esphome-docs/blob/2119b8223c5e63a2e6c07a40ef137d8d535cc1a5/components/at581x.rst#configuration-variables-3
    - priority: 600
      then:
        - script.execute: draw_display
        - delay: 30s
        - if:
            condition:
              lambda: return id(init_in_progress);
            then:
              - lambda: id(init_in_progress) = false;
              - script.execute: draw_display


esp32:
  board: esp32s3box
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_AUDIO_BOARD_CUSTOM: "y"
      CONFIG_ESP32_S3_BOX_3_BOARD: "y"
    components:
      - name: esp32_s3_box_3_board
        source: github://X-Ryl669/esp32-s3-box-3-board@main
        refresh: 0s

psram:
  mode: octal
  speed: 80MHz

api:
  on_client_connected:
    - script.execute: draw_display
  on_client_disconnected:
    - script.execute: draw_display
  encryption:
    key: ${api_password}


ota:
  password: ${ota_password}


dashboard_import:
  package_import_url: github://esphome/firmware/wake-word-voice-assistant/esp32-s3-box-3.yaml@main

wifi:
  ap:
  on_connect:
    - script.execute: draw_display
    - delay: 5s # Gives time for improv results to be transmitted
    - ble.disable:
  on_disconnect:
    - script.execute: draw_display
    - ble.enable:
  ssid: ${wifi_ssid}
  password: ${wifi_password}
  manual_ip:
    static_ip: 192.168.0.180
    gateway: 192.168.0.1
    subnet: 255.255.255.0

improv_serial:

esp32_improv:
  authorizer: none

button:
  - platform: factory_reset
    id: factory_reset_btn
    name: Factory reset
  - platform: restart
    id: restart_btn
    name: Restart

at581x:
  id: "Waveradar"
  i2c_id: bus_a

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO1
      inverted: true
    name: "Mute"
    disabled_by_default: true
    entity_category: diagnostic

  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: true
      ignore_strapping_warning: true
    name: Top Left Button
    disabled_by_default: true
    entity_category: diagnostic
    on_multi_click:
      - timing:
          - ON for at least 10s
        then:
          - button.press: factory_reset_btn
  
  - platform: gpio
    pin: GPIO21
    name: "Occupancy"
    on_press:
      then:
        - light.turn_on: led
    on_release:
      then:
        - light.turn_off: led

output:
  - platform: ledc
    pin: GPIO47
    id: backlight_output

light:
  - platform: monochromatic
    id: led
    name: LCD Backlight
    entity_category: config
    output: backlight_output
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms

touchscreen:
  platform: gt911
  i2c_id: bus_0
  id: gt911_touchscreen
  interrupt_pin: GPIO3
  on_touch:
    - then:
      - logger.log:
          format: Touch at (%d, %d)
          args: [touch.x, touch.y]
      - light.turn_on: led
      - delay: 5s
      - light.turn_off: led

esp_adf:
  board: esp32s3box3

microphone:
  - platform: esp_adf
    id: box_mic

speaker:
  - platform: esp_adf
    id: box_speaker

micro_wake_word:
  model: ${micro_wake_word_model}
  on_wake_word_detected:
    - if:
        condition:
          switch.is_on: continued_conversation
        then:
          - lambda: id(va).set_use_wake_word(false);
          - voice_assistant.start_continuous: # wake_word: !lambda return wake_word; not yet supported for continuous
        else:
          - lambda: id(va).set_use_wake_word(false);
          - voice_assistant.start:
              wake_word: !lambda return wake_word;

voice_assistant:
  id: va
  microphone: box_mic
  speaker: box_speaker
  use_wake_word: true
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0
  vad_threshold: 3
  on_listening:
    - lambda: id(voice_assistant_phase) = ${voice_assist_listening_phase_id};
    - if:
        condition:
          - switch.is_off: continued_conversation
        then:
          - text_sensor.template.publish:
              id: text_request
              state: "..."
          - text_sensor.template.publish:
              id: text_response
              state: "..."
    - light.turn_on: led
    - script.execute: draw_display
    - delay: 5s
    - light.turn_off: led
    - if:
        condition:
          - switch.is_on: continued_conversation
        then:
          - script.execute: stt_timeout_to_idle
          - lambda: id(va).set_use_wake_word(false);

  on_stt_end:
    - text_sensor.template.publish:
        id: text_request
        state: !lambda return x;
    - script.execute: draw_display
    - if:
        condition:
          - switch.is_on: continued_conversation
        then:
          - script.execute: stt_timeout_to_idle
  on_stt_vad_start:
    then:
      - light.turn_on: led
  #    - delay: 5s
  #    - light.turn_off: led

  on_stt_vad_end:
    - lambda: id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
    - script.execute: draw_display
    - if:
        condition:
          - switch.is_on: continued_conversation
        then:
          - script.execute: stt_timeout_to_idle
  on_tts_start:
    - text_sensor.template.publish:
        id: text_response
        state: !lambda return x;
    - if:
        condition:
          and:
            # When using extended openai conversation, add the following to the prompt
            # If you feel the user has finished and doesn't want to talk anymore, just respond with the exact phrase "Ok, bye."
            - lambda: return (x == "Ok, bye.");
            - switch.is_on: continued_conversation
        then:
          - script.execute: return_to_idle
  on_tts_stream_start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
    - light.turn_on: led
    - script.execute: draw_display
    - if:
        condition:
          - switch.is_on: continued_conversation
        then:
          - script.execute: stt_timeout_to_idle
  on_tts_stream_end:
    - if:
        condition:
          - switch.is_on: continued_conversation
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_listening_phase_id};
          - script.execute: stt_timeout_to_idle
        else:
          - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
    - script.execute: draw_display
    - delay: 5s
    - light.turn_off: led
  on_end:
    - if:
        condition:
          and:
            - switch.is_off: mute
            - lambda: return id(wake_word_engine_location).state == "On device";
            - switch.is_off: continued_conversation
        then:
          - script.execute: return_to_idle
  on_error:
    - if:
        condition:
          and:
            - lambda: return !id(init_in_progress);
            - lambda: return !(code == "stt-no-text-recognized");
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
          - light.turn_on: led
          - script.execute: draw_display
          - delay: 1s
          - script.stop: stt_timeout_to_idle
          - if:
              condition:
                switch.is_off: mute
              then:
                - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
                - script.execute: return_to_idle
              else:
                - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
          - script.execute: draw_display
  on_client_connected:
    - if:
        condition:
          switch.is_off: mute
        then:
          - wait_until:
              not: ble.enabled
          - script.execute: return_to_idle
         # - voice_assistant.start_continuous:
         # - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
        else:
          - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
    - lambda: id(init_in_progress) = false;
    - script.execute: draw_display
  on_client_disconnected:
    - if:
        condition:
          lambda: return id(wake_word_engine_location).state == "In Home Assistant";
        then:
          - lambda: id(va).set_use_wake_word(false);
          - voice_assistant.stop:
    - if:
        condition:
          lambda: return id(wake_word_engine_location).state == "On device";
        then:
          - micro_wake_word.stop
    - lambda: id(voice_assistant_phase) = ${voice_assist_not_ready_phase_id};
    - light.turn_on: led
    - script.execute: draw_display

script:
  - id: stt_timeout_to_idle
    mode: restart     # restart the timer if called before timeout
    then:
      if:
        condition:
          switch.is_on: continued_conversation
        then:
          - delay: !lambda "return id(continued_timeout).state * 1000;"
          - if:
              condition:
                lambda: return (id(voice_assistant_phase) == ${voice_assist_replying_phase_id});
              then:
                - wait_until:
                    condition:
                      lambda: return !(id(voice_assistant_phase) == ${voice_assist_replying_phase_id});
                      # normally this would complete and move to next phase with on_tts_stream_end,
                      # but sometimes this is missed so put a time limit on the wait
                    timeout: 10s
                - delay: 1s  # Give time for the stream to end and the phase to be switched back to listening and this timeout to be reset
          - script.execute: return_to_idle

  - id: return_to_idle
    then:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).state == "On device";
          then:
            - script.stop: stt_timeout_to_idle
            - if:
                condition:
                  voice_assistant.is_running
                then:
                  - lambda: id(va).set_use_wake_word(false);
                  - voice_assistant.stop
                  - wait_until:
                      condition:
                        not:
                          voice_assistant.is_running
                      timeout: 5s
            - if:
                condition:
                  not:
                    micro_wake_word.is_running
                then:
                  - micro_wake_word.start:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).state == "In Home Assistant";
          then:
            - if:
                condition:
                  micro_wake_word.is_running
                then:
                  - micro_wake_word.stop:
                  - wait_until:
                      condition:
                        not:
                          micro_wake_word.is_running
                      timeout: 5s
            - wait_until:
                condition:
                  not:
                    voice_assistant.is_running
                timeout: 5s
            - lambda: id(va).set_use_wake_word(true);
            - if:
                condition:
                  - not:
                      voice_assistant.is_running
                then:
                  - voice_assistant.start_continuous:
      - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
      - script.execute: draw_display

  - id: draw_display
    then:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - if:
                condition:
                  wifi.connected:
                then:
                  - if:
                      condition:
                        api.connected:
                      then:
                        - lambda: |
                            switch(id(voice_assistant_phase)) {
                              case ${voice_assist_listening_phase_id}:
                                id(s3_box_lcd).show_page(listening_page);
                                id(s3_box_lcd).update();
                                break;
                              case ${voice_assist_thinking_phase_id}:
                                id(s3_box_lcd).show_page(thinking_page);
                                id(s3_box_lcd).update();
                                break;
                              case ${voice_assist_replying_phase_id}:
                                id(s3_box_lcd).show_page(replying_page);
                                id(s3_box_lcd).update();
                                break;
                              case ${voice_assist_error_phase_id}:
                                id(s3_box_lcd).show_page(error_page);
                                id(s3_box_lcd).update();
                                break;
                              case ${voice_assist_muted_phase_id}:
                                id(s3_box_lcd).show_page(muted_page);
                                id(s3_box_lcd).update();
                                break;
                              case ${voice_assist_not_ready_phase_id}:
                                id(s3_box_lcd).show_page(no_ha_page);
                                id(s3_box_lcd).update();
                                break;
                              default:
                                id(s3_box_lcd).show_page(idle_page);
                                id(s3_box_lcd).update();
                            }
                      else:
                        - display.page.show: no_ha_page
                        - component.update: s3_box_lcd
                else:
                  - display.page.show: no_wifi_page
                  - component.update: s3_box_lcd
          else:
            - display.page.show: initializing_page
            - component.update: s3_box_lcd

switch:
  - platform: template
    name: Display conversation
    id: display_conversation
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    on_turn_off:
      - script.execute: draw_display
    on_turn_on:
      - script.execute: draw_display

  - platform: template
    name: Display text prompts
    id: display_text
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    on_turn_off:
      - script.execute: draw_display
    on_turn_on:
      - script.execute: draw_display

  - platform: template
    name: Mute
    id: mute
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    on_turn_off:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - script.execute: return_to_idle
            #- lambda: id(va).set_use_wake_word(true);
            #- lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
            #- if:
            #    condition:
            #      not:
            #        - voice_assistant.is_running
            #    then:
            #      - voice_assistant.start_continuous
            #- script.execute: draw_display
    on_turn_on:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - voice_assistant.stop
            - lambda: id(va).set_use_wake_word(false);
            - if:
                condition:
                  - voice_assistant.is_running
                then:
                  - voice_assistant.stop
            - if:
                condition:
                  - micro_wake_word.is_running
                then:
                  - micro_wake_word.stop
            - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
            - script.execute: draw_display
  - platform: at581x
    at581x_id: "Waveradar"
    name: "Enable Radar"

  - platform: template
    name: Continued conversation
    id: continued_conversation
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    on_turn_off:
      - script.execute: return_to_idle
    on_turn_on:
      - script.execute: return_to_idle

number:
  - platform: template
    entity_category: config
    name: Continued timeout
    id: continued_timeout
    icon: mdi:clock
    optimistic: true
    restore_value: true
    initial_value: 8
    min_value: 1
    step: 1
    max_value: 10
    unit_of_measurement: s
    mode: slider

select:
  - platform: template
    entity_category: config
    name: Wake word engine location
    id: wake_word_engine_location
    optimistic: true
    restore_value: true
    options:
      - In Home Assistant
      - On device
    initial_option: On device
    on_value:
      - wait_until:
          lambda: return id(voice_assistant_phase) == ${voice_assist_muted_phase_id} || id(voice_assistant_phase) == ${voice_assist_idle_phase_id};
      - script.execute: return_to_idle

  - platform: template
    entity_category: config
    name: Display clock date
    id: display_date
    optimistic: true
    restore_value: true
    options:
      - None
      - Short (US)
      - Short (UK)
      - Short (EU)
      - Long
      - Long with weekday
      - Weekday only
    initial_option: None
    on_value:
      - lambda: |-
          switch (i) {
            case 0:
              id(date_format_string) = "";
              break;
            case 1:
              id(date_format_string) = "%m/%d/%y";
              break;
            case 2:
              id(date_format_string) = "%d/%m/%y";
              break;
            case 3:
              id(date_format_string) = "%d.%m.%y";
              break;
            case 4:
              id(date_format_string) = "%d %b, %Y";
              break;
            case 5:
              id(date_format_string) = "%a, %d %b, %Y";
              break;
            case 6:
              id(date_format_string) = "%A";
              break;
          }
      - script.execute: draw_display

  - platform: template
    entity_category: config
    name: Display clock time
    id: display_time
    optimistic: true
    restore_value: true
    options:
      - None
      - 12 hour
      - 24 hour
    initial_option: 12 hour
    on_value:
      - lambda: |-
          switch (i) {
            case 0:
              id(time_format_string) = "";
              break;
            case 1:
              id(time_format_string) = "%I:%M %p";
              break;
            case 2:
              id(time_format_string) = "%H:%M";
              break;
          }
      - script.execute: draw_display

globals:
  - id: init_in_progress
    type: bool
    restore_value: no
    initial_value: "true"
  - id: voice_assistant_phase
    type: int
    restore_value: no
    initial_value: ${voice_assist_not_ready_phase_id}
  - id: date_format_string
    type: std::string
    restore_value: true
    initial_value: ""
  - id: time_format_string
    type: std::string
    restore_value: true
    initial_value: ""

image:
  - file: ${error_illustration_file}
    id: casita_error
    resize: 320x240
    type: RGB24
    use_transparency: true
  - file: ${idle_illustration_file}
    id: casita_idle
    resize: 320x240
    type: RGB24
    use_transparency: true
  - file: ${listening_illustration_file}
    id: casita_listening
    resize: 320x240
    type: RGB24
    use_transparency: true
  - file: ${thinking_illustration_file}
    id: casita_thinking
    resize: 320x240
    type: RGB24
    use_transparency: true
  - file: ${replying_illustration_file}
    id: casita_replying
    resize: 320x240
    type: RGB24
    use_transparency: true
  - file: ${loading_illustration_file}
    id: casita_initializing
    resize: 320x240
    type: RGB24
    use_transparency: true
  - file: https://github.com/esphome/firmware/raw/main/voice-assistant/error_box_illustrations/error-no-wifi.png
    id: error_no_wifi
    resize: 320x240
    type: RGB24
    use_transparency: true
  - file: https://github.com/esphome/firmware/raw/main/voice-assistant/error_box_illustrations/error-no-ha.png
    id: error_no_ha
    resize: 320x240
    type: RGB24
    use_transparency: true

font:
  - file:
      type: gfonts
      family: Roboto
      weight: 300
    glyphs: ${allowed_characters}
    id: font_text
    size: 16
  - file:
      type: gfonts
      family: Figtree
      weight: 300
      italic: true
    glyphs: ${allowed_characters}
    id: font_request
    size: 15
  - file:
      type: gfonts
      family: Figtree
      weight: 300
    glyphs: ${allowed_characters}
    id: font_response
    size: 15

text_sensor:
  - id: text_request
    name: Assist query
    platform: template
    on_value:
      lambda: |-
        if(id(text_request).state.length()>32) {
          std::string name = id(text_request).state.c_str();
          std::string truncated = esphome::str_truncate(name.c_str(),31);
          id(text_request).state = (truncated+"...").c_str();
        }
  - id: text_response
    name: Assist reply
    platform: template
    on_value:
      lambda: |-
        if(id(text_response).state.length()>32) {
          std::string name = id(text_response).state.c_str();
          std::string truncated = esphome::str_truncate(name.c_str(),31);
          id(text_response).state = (truncated+"...").c_str();
        }

color:
  - id: idle_color
    hex: ${idle_illustration_background_color}
  - id: listening_color
    hex: ${listening_illustration_background_color}
  - id: thinking_color
    hex: ${thinking_illustration_background_color}
  - id: replying_color
    hex: ${replying_illustration_background_color}
  - id: loading_color
    hex: ${loading_illustration_background_color}
  - id: error_color
    hex: ${error_illustration_background_color}
  - id: text_outline_color
    hex: ${text_outline_color}

spi:
  clk_pin: 7
  mosi_pin: 6

time:
  - platform: sntp
    id: the_time
    on_time:
      - cron: 0 * * * * *
        then:
          - if:
              condition:
                - lambda: return ( std::string(id(time_format_string).c_str()) != "" );
              then:
                # - logger.log: "(on_time) Updating time display"
                - script.execute: draw_display
      - cron: 1 0 0 * * *
        then:
          - if:
              condition:
                - lambda: return ( std::string(id(date_format_string).c_str()) != "" );
              then:
                # - logger.log: "(on_time) Updating date display"
                - script.execute: draw_display

display:
  - platform: ili9xxx
    id: s3_box_lcd
    model: S3BOX
    data_rate: 40MHz
    cs_pin: 5
    dc_pin: 4
    reset_pin:
      number: 48
      inverted: true
    update_interval: never
    pages:
      - id: idle_page
        lambda: |-
          it.fill(id(idle_color));
          it.image((it.get_width() / 2), (it.get_height() / 2), id(casita_idle), ImageAlign::CENTER);
          if ( id(display_text).state ) {

            int x1, y1, text_width, text_height;
            it.get_text_bounds(0, 0, "${wake_word_prompt}", id(font_text), TextAlign::TOP_LEFT, &x1, &y1, &text_width, &text_height); // Get the text dimensions
            int rect_width = text_width + 10; // 5-pixel padding
            int rect_height = text_height + 10; // 5-pixel padding
            int rect_x = 10; // Margin from the left
            int rect_y = 10; // Margin from the top
            int text_x = rect_x + 5; // 5-pixel padding
            int text_y = rect_y + 5; // 5-pixel padding

            it.filled_rectangle(rect_x, rect_y, rect_width, rect_height, Color::BLACK); // Draw the black rectangle
            it.rectangle(rect_x, rect_y, rect_width, rect_height, text_outline_color); // Draw the outline
            it.print( text_x, text_y, id(font_text), Color::WHITE, "${wake_word_prompt}" ); // Print the text in white
          }

          if ( std::string(id(date_format_string).c_str()) != "" or std::string(id(time_format_string).c_str()) != "" ) {
            // Get the format strings
            std::string date_format = id(date_format_string).c_str();
            std::string time_format = id(time_format_string).c_str();
            // Construct the format string
            std::string format_string;
            if (!date_format.empty() && !time_format.empty()) {
                format_string = date_format + " - " + time_format;
            } else if (!date_format.empty()) {
                format_string = date_format;
            } else {
                format_string = time_format;
            }
            // Get the current date and time text
            auto date_time_text = id(the_time).now().strftime(format_string.c_str());
            if (id(display_time).state == "12 hour") {
              // Remove leading zeros from day and hour
              size_t pos = date_time_text.find(" 0");
              while (pos != std::string::npos) {
                date_time_text.erase(pos + 1, 1); // Remove the leading zero
                pos = date_time_text.find(" 0", pos); // Find the next occurrence
              }
            }

            int x1, y1, text_width, text_height;
            it.get_text_bounds(0, 0, date_time_text.c_str(), id(font_text), TextAlign::TOP_LEFT, &x1, &y1, &text_width, &text_height); // Get the text dimensions
            int rect_width = text_width + 10; // 5-pixel padding
            int rect_height = text_height + 10; // 5-pixel padding
            int rect_x = (it.get_width() - rect_width) / 2; // Centered
            int rect_y = it.get_height() - rect_height - 8; // margin from the bottom
            int text_x = rect_x + (rect_width - text_width) / 2; // Centered
            int text_y = rect_y + 5; // 5-pixel padding

            it.filled_rectangle(rect_x, rect_y, rect_width, rect_height, Color::BLACK); // Draw the black rectangle
            it.rectangle(rect_x, rect_y, rect_width, rect_height, text_outline_color); // Draw the outline
            it.printf( text_x, text_y, id(font_text), Color::WHITE, TextAlign::TOP_LEFT, "%s", date_time_text.c_str() ); // Print the text in white
          }
      - id: listening_page
        lambda: |-
          it.fill(id(listening_color));
          it.image((it.get_width() / 2), (it.get_height() / 2), id(casita_listening), ImageAlign::CENTER);
          if ( id(display_text).state ) {
            int x1, y1, text_width, text_height;
            it.get_text_bounds(0, 0, "${listening_prompt}", id(font_text), TextAlign::TOP_LEFT, &x1, &y1, &text_width, &text_height); // Get the text dimensions
            it.filled_rectangle(10, 10, text_width + 10, text_height + 10, Color::WHITE); // Draw the white rectangle
            it.rectangle(10, 10, text_width + 10, text_height + 10, text_outline_color); // Draw the outline
            it.print( 15, 15, id(font_text), Color::BLACK, "${listening_prompt}" ); // Print the text in black
          }
      - id: thinking_page
        lambda: |-
          it.fill(id(thinking_color));
          it.image((it.get_width() / 2), (it.get_height() / 2), id(casita_thinking), ImageAlign::CENTER);
          if (id(display_conversation).state) {
            it.filled_rectangle(20 , 20 , 280 , 30 , Color::WHITE );
            it.rectangle(20 , 20 , 280 , 30 , Color::BLACK );
            it.printf(30, 25, id(font_request), Color::BLACK, "%s", id(text_request).state.c_str());
          }
      - id: replying_page
        lambda: |-
          it.fill(id(replying_color));
          it.image((it.get_width() / 2), (it.get_height() / 2), id(casita_replying), ImageAlign::CENTER);
          if (id(display_conversation).state) {
            it.filled_rectangle(20 , 20 , 280 , 30 , Color::WHITE );
            it.rectangle(20 , 20 , 280 , 30 , Color::BLACK );
            it.filled_rectangle(20 , 190 , 280 , 30 , Color::WHITE );
            it.rectangle(20 , 190 , 280 , 30 , Color::BLACK );
            it.printf(30, 25, id(font_request), Color::BLACK, "%s", id(text_request).state.c_str());
            it.printf(30, 195, id(font_response), Color::BLACK, "%s", id(text_response).state.c_str());
          }
      - id: error_page
        lambda: |-
          it.fill(id(error_color));
          it.image((it.get_width() / 2), (it.get_height() / 2), id(casita_error), ImageAlign::CENTER);
          if ( id(display_text).state ) {
            int x1, y1, text_width, text_height;
            it.get_text_bounds(0, 0, "${error_prompt}", id(font_text), TextAlign::TOP_LEFT, &x1, &y1, &text_width, &text_height); // Get the text dimensions
            it.filled_rectangle(10, 10, text_width + 10, text_height + 10, Color::BLACK); // Draw the black rectangle
            it.rectangle(10, 10, text_width + 10, text_height + 10, text_outline_color); // Draw the outline
            it.print( 15, 15, id(font_text), Color::WHITE, "${error_prompt}" ); // Print the text in white
          }
      - id: no_ha_page
        lambda: |-
          it.image((it.get_width() / 2), (it.get_height() / 2), id(error_no_ha), ImageAlign::CENTER);
      - id: no_wifi_page
        lambda: |-
          it.image((it.get_width() / 2), (it.get_height() / 2), id(error_no_wifi), ImageAlign::CENTER);
      - id: initializing_page
        lambda: |-
          it.fill(id(loading_color));
          it.image((it.get_width() / 2), (it.get_height() / 2), id(casita_initializing), ImageAlign::CENTER);
          if ( id(display_text).state ) {
            int x1, y1, text_width, text_height;
            it.get_text_bounds(0, 0, "${starting_up}", id(font_text), TextAlign::TOP_LEFT, &x1, &y1, &text_width, &text_height); // Get the text dimensions
            it.filled_rectangle(10, 10, text_width + 10, text_height + 10, Color::BLACK); // Draw the black rectangle
            it.rectangle(10, 10, text_width + 10, text_height + 10, text_outline_color); // Draw the outline
            it.print( 15, 15, id(font_text), Color::WHITE, "${starting_up}" ); // Print the text in white
          }
      - id: muted_page
        lambda: |-
          it.fill(Color::BLACK);
          
i2c:
  - id: bus_0
    sda: GPIO8
    scl: GPIO18
    scan: false
    frequency: 100kHz
  - id: bus_a
    sda: GPIO41
    scl: GPIO40
    sda_pullup_enabled: false
    scl_pullup_enabled: false
    scan: false
    frequency: 100kHz
    
sensor:
  - platform: ahtxx
    type: aht30
    i2c_id: bus_a
    id: aht_20
    address: 0x38
    temperature:
      name: "Temperature"
    humidity:
      name: "Humidity"
    update_interval: 20s
  

logger:
  # CDC logging is currently not working on the S3
  # See https://github.com/espressif/esp-idf/commit/9924d9f27192a5fab5f66230c72249ecc6cad34c
  #hardware_uart: USB_CDC
  #level: VERY_VERBOSE
  #level: INFO

# Enable Home Assistant API
web_server:
  port: 80
  auth:
    username: admin
    password: ${web_password}
